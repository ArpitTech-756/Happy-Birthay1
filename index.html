<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: 'Segoe UI', sans-serif;
}

body{
background:linear-gradient(135deg,#ffe6eb,#ffd6e0);
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

/* HERO */

.hero{
position:relative;
z-index:10;
}

h1{
font-size:70px;
color:#ff2d55;
margin-bottom:20px;
font-family: 'Great Vibes', cursive;
}

p{
font-size:20px;
color:#444;
max-width:500px;
margin:auto;
}

button{
margin-top:30px;
padding:15px 40px;
border:none;
border-radius:40px;
font-size:18px;
background:linear-gradient(45deg,#ff2d55,#ff6a88);
color:white;
cursor:pointer;
box-shadow:0 10px 30px rgba(255,0,80,0.3);
transition:.3s;
}

button:hover{
transform:scale(1.1);
}

/* HEARTS BACKGROUND */

.hearts{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
overflow:hidden;
z-index:1;
}

.heart{
position:absolute;
color:#ff2d55;
font-size:20px;
animation:fall linear infinite;
opacity:.7;
}

@keyframes fall{

0%{
transform:translateY(-10vh) rotate(0deg);
}

100%{
transform:translateY(110vh) rotate(360deg);
}

}

/* POPUP */

.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0);
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 20px 60px rgba(0,0,0,.2);
text-align:center;
transition:.4s;
z-index:20;
}

.popup.active{
transform:translate(-50%,-50%) scale(1);
}

.popup h2{
color:#ff2d55;
margin-bottom:10px;
}

.close{
margin-top:20px;
padding:10px 25px;
border:none;
border-radius:20px;
background:#ff2d55;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<div class="hearts"></div>

<div class="hero">

<h1>Happy Birthday Shristi 🧸</h1>

<p>
Wishing you a day filled with love, joy and unforgettable moments.
You deserve all the happiness in the world.
</p>

<a href="wishes.html">
<button>Send Birthday Love</button>
</a>
<p>Next Page</p>

</div>
</body>



<script>




document.addEventListener("DOMContentLoaded", function(){

const heartsContainer = document.querySelector(".hearts")

function createHeart(){

const heart = document.createElement("div")
heart.classList.add("heart")
heart.innerHTML="🧸"

heart.style.left = Math.random()*100 + "%"
heart.style.fontSize = (Math.random()*20+10) + "px"
heart.style.animationDuration = (Math.random()*5+5) + "s"

heartsContainer.appendChild(heart)

setTimeout(()=>{
heart.remove()
},8000)

}

setInterval(createHeart,300)

})

     //music pop//

let music = document.getElementById("bgMusic");
let popup = document.getElementById("musicPopup");

window.onload = function(){

let savedMusic = localStorage.getItem("selectedMusic");

if(savedMusic){
popup.style.display="none";
music.src = savedMusic;
music.play();
}

}

function selectMusic(song){

localStorage.setItem("selectedMusic",song);

music.src = song;
music.play();

popup.style.display="none";

}
</script>
</html>
